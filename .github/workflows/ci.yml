name: CI

on:
  push:
    branches: [main, 'rc/**']
  pull_request:
  workflow_dispatch:

env:
  CARGO_AUDIT_VERSION: "0.22.1"
  MATURIN_VERSION: "1.13.3"
  RUST_MSRV: "1.83.0"
  WASM_PACK_VERSION: "0.15.0"

jobs:
  contract-lockstep:
    name: Shared contract lockstep
    runs-on: ubuntu-latest
    outputs:
      peer-ref: ${{ steps.peer.outputs.ref }}
    env:
      DAG_ML_DATA_REPO: ${{ github.workspace }}/external/dag-ml-data
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
      - name: Contract validator dependencies
        run: python -m pip install -r scripts/requirements-contracts.txt pytest
      - name: Resolve dag-ml-data contract peer
        id: peer
        shell: bash
        run: |
          set -euo pipefail
          peer_repo="GBeurier/dag-ml-data"
          branch="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          ref="main"
          paired="false"

          if git ls-remote --exit-code --heads "https://github.com/${peer_repo}.git" "$branch" >/dev/null 2>&1; then
            ref="$branch"
            paired="true"
          fi

          contract_changed="false"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
            changed="$(
              git diff --name-only FETCH_HEAD HEAD -- \
                docs/contracts \
                examples/fixtures \
                examples/fixtures/robustness \
                parity/conformal \
                parity/canonical \
                parity/robustness_rng \
                scripts/validate_contracts.py \
                crates/dag-ml-capi/include \
                crates/dag-ml-core/src/runtime/prediction_store.rs
            )"
            if [ -n "$changed" ]; then
              contract_changed="true"
            fi
            if [ "$contract_changed" = "true" ] && [ "$paired" != "true" ]; then
              echo "::error::Shared contract changes require a paired ${peer_repo} branch named '${branch}'."
              printf '%s\n' "$changed"
              exit 1
            fi
          fi

          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          echo "contract_changed=$contract_changed" >> "$GITHUB_OUTPUT"
      - name: Checkout dag-ml-data contract peer
        uses: actions/checkout@v7
        with:
          repository: GBeurier/dag-ml-data
          ref: ${{ steps.peer.outputs.ref }}
          path: external/dag-ml-data
      - name: Shared contract
        run: python scripts/validate_contracts.py --require-sibling --sibling-root external/dag-ml-data
      - name: Conformal and robustness oracle
        run: python -m pytest parity/conformal/tests/test_conformal_robustness_contracts.py -q
      - name: Native training contract oracle
        run: python -m pytest parity/training/tests/test_training_contracts.py -q
      - name: Robustness RNG oracle
        run: python -m pytest parity/robustness_rng/tests/test_robustness_rng_contract.py -q
      - name: Canonical Rust oracle
        env:
          CARGO_TARGET_DIR: ${{ runner.temp }}/dagml-canonical-rust-target
        run: cargo test --locked --manifest-path parity/canonical/rust-oracle/Cargo.toml
      - name: Cross-language canonical parity
        run: python -m pytest parity/canonical/tests/test_rust_oracle_parity.py -q

  msrv:
    name: MSRV Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_MSRV }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Check MSRV
        run: cargo check --workspace --all-targets

  rust:
    name: Rust
    needs: contract-lockstep
    runs-on: ubuntu-latest
    env:
      DAG_ML_DATA_REPO: ${{ github.workspace }}/external/dag-ml-data
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so scripts/check_so_freshness.py can compare the
          # committed .so's last-commit time against its Rust sources; a
          # shallow checkout reports the checkout commit for all paths and
          # would make the guard false-negative.
          fetch-depth: 0
      - name: Checkout dag-ml-data contract peer
        uses: actions/checkout@v7
        with:
          repository: GBeurier/dag-ml-data
          ref: ${{ needs.contract-lockstep.outputs.peer-ref }}
          path: external/dag-ml-data
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Python adapter dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r scripts/requirements-contracts.txt numpy scikit-learn
      - name: Shared contract
        run: python scripts/validate_contracts.py --require-sibling --sibling-root external/dag-ml-data
      - name: Release metadata
        run: python scripts/validate_release_metadata.py
      - name: Error taxonomy
        run: python scripts/check_error_taxonomy.py
      - name: Observability field privacy
        run: python scripts/lint_tracing_fields.py
      - name: Managed debt
        run: python scripts/check_deprecations.py
      - name: Public documentation ratchet
        run: python scripts/check_public_docs.py
      - name: ABI snapshot
        run: python scripts/validate_abi_snapshot.py
      - name: Install cargo-audit
        run: cargo install cargo-audit --version "$CARGO_AUDIT_VERSION" --locked
      - name: Supply-chain audit
        run: cargo audit --deny warnings
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
      - name: Committed extension freshness
        run: |
          python scripts/check_so_freshness.py --self-test
          python scripts/check_so_freshness.py
      - name: Smoke committed extension public training APIs
        run: |
          PYTHONPATH=crates/dag-ml-py/python python - <<'PY'
          import json
          from pathlib import Path

          import dag_ml
          import dag_ml._dag_ml as native

          manifest = json.loads(dag_ml.contract_manifest_json())
          assert native.version() == "0.2.7"
          assert "TrainingRequest" in manifest["python_facade_exports"]
          assert callable(dag_ml.validate_training_request_json)

          fixtures = Path("examples/fixtures/training")
          request_json = (fixtures / "training_request_active_influence.v1.json").read_text()
          package_json = (fixtures / "portable_predictor_package.v1.json").read_text()
          projection_json = (fixtures / "parameter_projection_empty.v1.json").read_text()

          request = dag_ml.TrainingRequest(request_json)
          projection = request.project()
          projected = projection.to_dict()
          assert projected["request_id"] == "training:fixture.active_influence"
          assert projected["request_fingerprint"] == (
              "df52b77b52dfb4e6436da726b22698079f2441cdd15b55d5de3c5e204bb73f2b"
          )
          assert projected["predictor_node_ids"] == ["model:base", "transform:snv"]
          assert projected["outputs"] == [{
              "output_id": "output:prediction",
              "node_id": "model:base",
              "port_name": "oof",
              "prediction_level": "sample",
              "unit_level": "physical_sample",
              "prediction_kind": "regression_point",
              "target_names": ["protein"],
              "target_units": ["percent"],
              "class_labels": [[]],
              "output_order": "target_order",
              "target_space": "raw",
          }]
          assert projected["parameters"]["nodes"]["model:base"]["params"] == {
              "n_estimators": 100
          }
          assert dag_ml.project_training_request(request).to_dict() == projected

          package = dag_ml.PortablePredictorPackage(package_json).to_dict()
          assert package["package_id"] == "predictor:package.fixture"
          assert package["package_fingerprint"] == (
              "7d5b7a33d90211de2676a43f45dd102d60910eec419a7daef427cc0fff228dd0"
          )
          assert package["predictor_node_ids"] == [
              "branch:b0.model:ridge",
              "branch:b1.augment:noise",
              "branch:b1.model:rf",
              "merge:stack.pred_plus_original.meta:ridge",
          ]
          assert [(binding["binding_id"], binding["port_name"], binding["prediction_source"])
                  for binding in package["output_bindings"]] == [
              ("output:meta.final", "oof", "final_refit")
          ]

          parameter_projection = dag_ml.ParameterProjection(projection_json).to_dict()
          assert parameter_projection["nodes"] == {
              "model:base": {
                  "params": {"n_estimators": 100},
                  "fit_params": {},
                  "control_params": {},
                  "structural_params": {},
              }
          }
          assert parameter_projection["requires_recompile"] is False
          assert parameter_projection["structural_patch_count"] == 0
          assert parameter_projection["patches_fingerprint"] == (
              "cea5f239e81001721b763cebf40cd71bca04972c51313fba335e0a96d7e81979"
          )
          assert parameter_projection["projection_fingerprint"] == (
              "9eff58f693db68df88c00637e38e860472099a90e9c8a271ed350fdcf67ca837"
          )

          missing_parameter_patches = json.loads(request_json)
          del missing_parameter_patches["parameter_patches"]
          try:
              dag_ml.validate_training_request_json(json.dumps(missing_parameter_patches))
          except dag_ml.DagMlError as error:
              assert "parameter_patches" in str(error)
          else:
              raise AssertionError("missing required parameter_patches was accepted")
          PY
      - name: Docs
        run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps
      - name: Package dry run
        run: cargo package --workspace --no-verify
      - name: Publish plan dry run
        run: python scripts/release/check_publish_plan.py --dry-run
      - name: Example graph
        run: cargo run -p dag-ml-cli -- validate-graph examples/minimal_graph.json

  sanitizer:
    name: AddressSanitizer (capi)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      # Exercise the C-ABI crate's raw-pointer marshaling and host-vtable
      # lifecycle tests under AddressSanitizer. Leak detection is disabled:
      # several tests intentionally hand allocations across the C boundary, and
      # this lane is for use-after-free / out-of-bounds / UB regressions.
      - name: capi unit tests under AddressSanitizer
        env:
          RUSTFLAGS: "-Zsanitizer=address"
          ASAN_OPTIONS: "detect_leaks=0"
        run: cargo test -p dag-ml-capi --lib -Zbuild-std --target x86_64-unknown-linux-gnu

  docs-site:
    name: Documentation site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r docs/requirements.txt
      - name: Build docs site
        run: sphinx-build -W --keep-going -b html docs docs/_build/html

  python-bindings:
    name: Python bindings ${{ matrix.python-version }}
    needs: contract-lockstep
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - name: Checkout dag-ml-data contract peer
        uses: actions/checkout@v7
        with:
          repository: GBeurier/dag-ml-data
          ref: ${{ needs.contract-lockstep.outputs.peer-ref }}
          path: external/dag-ml-data
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install maturin
        run: |
          python -m pip install --upgrade pip
          python -m pip install "maturin==$MATURIN_VERSION"
      - name: Build Python wheel
        run: |
          mkdir -p target/wheels
          cd external/dag-ml-data/crates/dag-ml-data-py
          python -m maturin build --release --features extension-module --out ../../../../target/wheels
          cd ../../../..
          cd crates/dag-ml-py
          python -m maturin build --release --features extension-module --out ../../target/wheels
      - name: Smoke Python wheel metadata
        run: python scripts/smoke_python_wheel_metadata.py target/wheels/dag_ml-*.whl
      - name: Smoke installed Python wheel
        run: |
          python -m pip install target/wheels/dag_ml_data-*.whl
          python -m pip install target/wheels/dag_ml-*.whl
          python scripts/smoke_python_bindings.py
          python scripts/smoke_python_integration.py external/dag-ml-data

  r-bindings:
    name: R bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: r-lib/actions/setup-r@v2
      - name: Install R dependencies
        run: Rscript -e 'install.packages("jsonlite", repos = "https://cloud.r-project.org")'
      - name: Build R source package
        run: |
          mkdir -p target/r
          cd target/r
          R CMD build ../../bindings/r
      - name: Check R source package
        run: R CMD check --no-manual target/r/dagml_*.tar.gz

  matlab-octave-bindings:
    name: MATLAB/Octave bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install GNU Octave
        run: sudo apt-get update && sudo apt-get install --yes octave
      - name: Test local implementation registry
        run: octave --no-gui --quiet --eval "addpath('bindings/matlab/tests'); local_implementation_registry"

  wasm-bindings:
    name: WASM bindings Node ${{ matrix.node-version }}
    needs: contract-lockstep
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22"]
    steps:
      - uses: actions/checkout@v7
      - name: Checkout dag-ml-data contract peer
        uses: actions/checkout@v7
        with:
          repository: GBeurier/dag-ml-data
          ref: ${{ needs.contract-lockstep.outputs.peer-ref }}
          path: external/dag-ml-data
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install wasm-pack
        run: cargo install wasm-pack --version "$WASM_PACK_VERSION" --locked
      - name: Build WASM nodejs package
        run: |
          out_dir="$PWD/target/wasm/dag-ml-wasm"
          wasm-pack build crates/dag-ml-wasm --target nodejs --out-dir "$out_dir" --release
          node scripts/smoke_wasm_bindings.cjs "$out_dir"
      - name: Build WASM web package
        run: |
          out_dir="$PWD/crates/dag-ml-wasm/pkg-web"
          rm -rf "$out_dir"
          wasm-pack build crates/dag-ml-wasm --target web --out-dir "$out_dir" --release
          node scripts/smoke_wasm_web_bindings.mjs "$out_dir"
          (cd crates/dag-ml-wasm && wasm-pack pack --pkg-dir pkg-web .)
          node scripts/smoke_wasm_tarball_metadata.mjs "$out_dir"
      - name: Cross-repo browser integration smoke
        run: |
          dag_ml_out="$PWD/crates/dag-ml-wasm/pkg-web"
          dag_ml_data_repo="$PWD/external/dag-ml-data"
          dag_ml_data_out="$dag_ml_data_repo/crates/dag-ml-data-wasm/pkg-web"
          rm -rf "$dag_ml_data_out"
          wasm-pack build "$dag_ml_data_repo/crates/dag-ml-data-wasm" --target web --out-dir "$dag_ml_data_out" --release
          (cd "$dag_ml_data_repo/crates/dag-ml-data-wasm" && wasm-pack pack --pkg-dir pkg-web .)
          node scripts/smoke_wasm_tarball_metadata.mjs "$dag_ml_data_out"
          node scripts/smoke_wasm_integration.mjs "$dag_ml_out" "$dag_ml_data_out" "$dag_ml_data_repo"
