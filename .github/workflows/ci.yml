name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    env:
      DAG_ML_DATA_REPO: ${{ github.workspace }}/external/dag-ml-data
    steps:
      - uses: actions/checkout@v4
      - name: Checkout dag-ml-data contract peer
        uses: actions/checkout@v4
        with:
          repository: GBeurier/dag-ml-data
          path: external/dag-ml-data
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Shared contract
        run: python3 scripts/validate_contracts.py
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
      - name: Example graph
        run: cargo run -p dag-ml-cli -- validate-graph examples/minimal_graph.json
