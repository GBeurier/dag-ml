version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      rust-runtime:
        patterns:
          - "*"

  # The PyO3 wheel crate is excluded from the cargo workspace, so the root
  # cargo watcher above does not see its Rust dependencies (pyo3, serde).
  # Watch its standalone manifest directly so security/version bumps still land.
  - package-ecosystem: "cargo"
    directory: "/crates/dag-ml-py"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      rust-runtime:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "pip"
    directory: "/crates/dag-ml-py"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
