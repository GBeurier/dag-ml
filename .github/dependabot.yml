version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      rust-runtime:
        patterns:
          - "*"
    ignore:
      # clap and pyo3 are intentionally pinned (scripts/validate_release_metadata.py);
      # any bump off the pin fails the Release metadata gate.
      - dependency-name: "clap"
      - dependency-name: "pyo3"
      # cpufeatures >=0.3 needs the edition2024 cargo feature (Cargo >=1.85),
      # which breaks the 1.83 MSRV gate.
      - dependency-name: "cpufeatures"
        versions: [">=0.3.0"]

  # The PyO3 wheel crate is excluded from the cargo workspace, so the root
  # cargo watcher above does not see its Rust dependencies (pyo3, serde).
  # Watch its standalone manifest directly so security/version bumps still land.
  - package-ecosystem: "cargo"
    directory: "/crates/dag-ml-py"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      rust-runtime:
        patterns:
          - "*"
    ignore:
      # clap and pyo3 are intentionally pinned (scripts/validate_release_metadata.py);
      # any bump off the pin fails the Release metadata gate.
      - dependency-name: "clap"
      - dependency-name: "pyo3"
      # cpufeatures >=0.3 needs the edition2024 cargo feature (Cargo >=1.85),
      # which breaks the 1.83 MSRV gate.
      - dependency-name: "cpufeatures"
        versions: [">=0.3.0"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "pip"
    directory: "/crates/dag-ml-py"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
